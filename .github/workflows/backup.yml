name: Backup

# Daily logical backup of the application data (public schema) with an
# automated restore test, so we know the dump is actually restorable — not
# just that a file was produced.
on:
  schedule:
    - cron: "0 9 * * *" # every day at 09:00 UTC
  workflow_dispatch: {} # allow manual runs (used to verify this PR)

jobs:
  backup:
    name: Dump + verify restore
    runs-on: ubuntu-latest

    # Throwaway Postgres to restore into. pgvector image so the `vector`
    # extension our embedding column needs is available.
    services:
      scratch:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scratch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      # DIRECT_URL = session connection (port 5432). pg_dump needs a real
      # session; it does NOT work over the transaction pooler (6543).
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Install latest postgresql-client
        # A newer pg_dump can dump an equal-or-older server, so installing the
        # latest client sidesteps Supabase-version matching.
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Put the v17 binaries first on PATH so `pg_dump` resolves to 17, not
          # the runner's pre-installed 16 (pg_dump must be >= the server version).
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Dump public schema
        # --schema=public: back up OUR application data, not Supabase's managed
        # auth/storage/etc. schemas (those are Supabase's to manage, and don't
        # restore to a vanilla Postgres anyway).
        # --no-owner / --no-privileges: portable restore to a different DB/role.
        run: |
          pg_dump --version   # sanity check: should now print 17.x
          pg_dump "$DIRECT_URL" \
            --schema=public --no-owner --no-privileges \
            --file=backup.sql
          gzip -k backup.sql
          ls -lh backup.sql backup.sql.gz

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup.sql.gz
          retention-days: 30

      - name: Verify restore into scratch DB
        env:
          PGPASSWORD: postgres
        run: |
          # The dumped tables need the pgvector type. Supabase keeps it in the
          # `extensions` schema, so create it there (and put that schema on the
          # search path) so the type resolves however the dump qualifies it.
          psql -h localhost -U postgres -d scratch -c \
            "CREATE SCHEMA IF NOT EXISTS extensions;
             CREATE EXTENSION IF NOT EXISTS vector WITH SCHEMA extensions;
             ALTER DATABASE scratch SET search_path TO public, extensions;"
          # Load the dump. Harmless idempotent-DDL noise ('schema public already
          # exists') shouldn't fail the job, so we don't stop on it here...
          psql -h localhost -U postgres -d scratch -f backup.sql || true
          # ...the real proof is that the application data is queryable. This
          # query (ON_ERROR_STOP) fails the job if the tables/data didn't restore.
          echo "Row counts in the scratch DB after restore:"
          psql -h localhost -U postgres -d scratch -v ON_ERROR_STOP=1 -c \
            "SELECT 'terms' AS tbl, count(*) FROM terms
             UNION ALL SELECT 'categories', count(*) FROM categories
             UNION ALL SELECT 'term_enrichments', count(*) FROM term_enrichments;"
