name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web — lint, typecheck, format
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/db
      DIRECT_URL: postgresql://user:password@localhost:5432/db
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Validate Prisma schema
        run: pnpm --filter web exec prisma validate

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check
      - run: pnpm --filter web test

  enrichment:
    name: Enrichment — ruff, mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipelines/enrichment
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy .
      - run: uv run pytest

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Non-blocking on purpose: the e2e drives real Supabase Auth, which rate-limits
    # CI's repeated sign-ins/getUser calls, making this job flaky independent of app
    # correctness (it passes reliably locally and in production). It still runs and
    # reports here, but merges are not gated on it. Run `pnpm --filter web e2e`
    # locally for a trustworthy signal. Revisit with a dedicated test Supabase project.
    continue-on-error: true
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build
        run: pnpm --filter web build

      - name: Run E2E tests
        run: pnpm --filter web e2e
