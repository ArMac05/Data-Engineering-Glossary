name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web — lint, typecheck, format
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/db
      DIRECT_URL: postgresql://user:password@localhost:5432/db
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Validate Prisma schema
        run: pnpm --filter web exec prisma validate

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check
      - run: pnpm --filter web test

  enrichment:
    name: Enrichment — ruff, mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipelines/enrichment
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy .
      - run: uv run pytest

  a11y:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    # The authenticated admin e2e (Playwright `chromium` project) is intentionally
    # NOT run in CI: it signs in against the shared Supabase project, whose auth
    # endpoint rate-limits CI's IPs, making it flaky independent of app
    # correctness. It's a LOCAL pre-merge check instead — `pnpm --filter web
    # e2e:chromium`. This `a11y` scan never signs in, so it's reliable and blocking;
    # a failure here is a real accessibility regression.
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build
        run: pnpm --filter web build

      - name: Run accessibility scan
        run: pnpm --filter web e2e:a11y
